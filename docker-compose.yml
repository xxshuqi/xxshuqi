version: "3.9"

services:
  still:
    build: .
    container_name: still-photobook
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - still_data:/data
    environment:
      - DATABASE_URL=file:/data/db.sqlite
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-still2026}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/photos"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  still_data:
    driver: local
